<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Total - RDC - Plan 3D</title>
<style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        border-left: 4px solid #ff6b00;
    }
    #legend {
        position: absolute;
        bottom: 30px;
        left: 30px;
        background: rgba(0,0,0,0.85);
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 11px;
        max-width: 260px;
    }
    #legend h3 { margin: 0 0 6px 0; color: #ff6b00; font-size: 13px; }
    #legend .item { display: flex; align-items: center; margin: 2px 0; }
    #legend .color-box { width: 12px; height: 12px; margin-right: 6px; border-radius: 2px; }
    #controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 15px;
        border-radius: 10px;
        z-index: 10;
        font-size: 11px;
        text-align: center;
    }
</style>
</head>
<body>
<div id="info">
    <h2 style="margin:0; color:#ff6b00;">⛽ Station Total - RDC</h2>
    <p style="margin:5px 0 0 0; opacity:0.8;">Rez-de-Chaussée - Station essence + Boutique | Plan 3D</p>
</div>
<div id="legend">
    <h3>🏗️ Légende RDC</h3>
    <div class="item"><div class="color-box" style="background:#e76f51;"></div> Boutique / Commerce</div>
    <div class="item"><div class="color-box" style="background:#f4a261;"></div> Réserve / Stock</div>
    <div class="item"><div class="color-box" style="background:#6c757d;"></div> Technique / Local</div>
    <div class="item"><div class="color-box" style="background:#2a9d8f;"></div> Sanitaires / Douche</div>
    <div class="item"><div class="color-box" style="background:#e9c46a;"></div> Station / Carburant</div>
    <div class="item"><div class="color-box" style="background:#9b59b6;"></div> Mosquée</div>
</div>
<div id="controls">
    <span>🖱 Tourner | Molette : Zoom | Clic droit : Pan</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(30, 25, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 80;
controls.target.set(0, 0, 0);

const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 4096;
sunLight.shadow.mapSize.height = 4096;
scene.add(sunLight);
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-20, 20, -20);
scene.add(fillLight);
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1a, 0.5);
scene.add(hemiLight);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 60),
    new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.05, 0);
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(70, 30, 0x444466, 0x333355);
grid.position.y = 0;
scene.add(grid);

function createFloor(x, z, w, d, color, h = 0.05) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 });
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    floor.position.set(x, 0, z);
    floor.receiveShadow = true;
    return floor;
}

function createWall(x, z, w, d, h = 3.0, color = 0xcccccc, opacity = 0.8) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1, transparent: true, opacity });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    wall.position.set(x, h/2, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    return wall;
}

function createLabel(text, x, z, y = 1.8, color = '#ffffff', size = '12px') {
    const div = document.createElement('div');
    div.textContent = text;
    div.style.color = color;
    div.style.fontFamily = 'Arial, sans-serif';
    div.style.fontSize = size;
    div.style.fontWeight = 'bold';
    div.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
    div.style.background = 'rgba(0,0,0,0.6)';
    div.style.padding = '3px 8px';
    div.style.borderRadius = '5px';
    div.style.border = '1px solid rgba(255,255,255,0.15)';
    div.style.backdropFilter = 'blur(3px)';
    div.style.pointerEvents = 'none';
    const label = new CSS2DObject(div);
    label.position.set(x, y, z);
    return label;
}

const WH = 3.5;
const WC = 0xbbbbcc;

// ==========================================
// RDC - STATION TOTAL
// ==========================================
// Dimensions approximatives basées sur les cotes du PDF
// Le bâtiment fait environ 28m x 18m

// === ZONE STATION / EXTERIEUR ===
// Aire de livraison
const aireLivr = createFloor(-18, -8, 12, 8, 0x6c757d);
scene.add(aireLivr);
scene.add(createLabel('📦 AIRE DE LIVRAISON', -18, -8, 0.5, '#ffffff', '11px'));

// Escalier RDC
const escalier = createFloor(-15, 4, 4, 3, 0xadb5bd);
scene.add(escalier);
scene.add(createLabel('🪜 ESCALIER RDC', -15, 4, 0.5, '#ffffff', '11px'));

// === BOUTIQUE FOC (79,98 m²) ===
const boutique = createFloor(0, -5, 10, 8, 0xe76f51);
scene.add(boutique);
scene.add(createLabel('🏪 BOUTIQUE FOC\n79,98 m²', 0, -5, 2.0, '#ffffff', '13px'));
// Murs boutique
scene.add(createWall(-5, -5, 0.15, 8, WH, WC));
scene.add(createWall(5, -5, 0.15, 8, WH, WC));
scene.add(createWall(0, -9, 10, 0.15, WH, WC));
scene.add(createWall(0, -1, 10, 0.15, WH, WC));

// === RESERVE FOC ===
const reserve = createFloor(5, 5, 5, 5, 0xf4a261);
scene.add(reserve);
scene.add(createLabel('📦 RESERVE FOC', 5, 5, 1.5, '#ffffff', '11px'));

// === CHAMBRE FROIDE ===
const chFroide = createFloor(5, 10, 4, 3, 0xade8f4);
scene.add(chFroide);
scene.add(createLabel('❄️ CHAMBRE FROIDE', 5, 10, 1.5, '#ffffff', '11px'));

// === RESERVE ===
const reserve2 = createFloor(-5, 8, 5, 5, 0xf4a261);
scene.add(reserve2);
scene.add(createLabel('📦 RESERVE', -5, 8, 1.5, '#ffffff', '11px'));

// === LOCAL TECH FOC ===
const localTech = createFloor(-5, 14, 5, 4, 0x6c757d);
scene.add(localTech);
scene.add(createLabel('🔧 LOCAL TECH FOC', -5, 14, 1.5, '#ffffff', '11px'));

// === TOILETTES FDC ===
const toilettesFDC = createFloor(5, 15, 5, 3, 0x2a9d8f);
scene.add(toilettesFDC);
scene.add(createLabel('🚻 TOILETTES FDC', 5, 15, 1.5, '#ffffff', '11px'));

// === ZONE TECHNIQUE ===
// Local TGBT
const tgbt = createFloor(-12, 14, 5, 4, 0x6c757d);
scene.add(tgbt);
scene.add(createLabel('⚡ LOCAL TGBT', -12, 14, 1.5, '#ffffff', '11px'));

// Steppe d'épuration
const steppe = createFloor(-18, 14, 5, 4, 0x495057);
scene.add(steppe);
scene.add(createLabel('💧 STEPPE ÉPURATION', -18, 14, 1.5, '#ffffff', '11px'));

// Local transfo FOC
const transfo = createFloor(-12, 8, 6, 4, 0x6c757d);
scene.add(transfo);
scene.add(createLabel('⚡ LOCAL TRANSFO FOC', -12, 8, 1.5, '#ffffff', '11px'));

// Décanteur
const decanteur = createFloor(-18, 8, 4, 4, 0x495057);
scene.add(decanteur);
scene.add(createLabel('💧 DÉCANTEUR', -18, 8, 1.5, '#ffffff', '11px'));

// === SANITAIRES ===
// WC Hommes
const wcH = createFloor(-8, -10, 3, 3, 0x2a9d8f);
scene.add(wcH);
scene.add(createLabel('🚹 WC', -8, -10, 1.5, '#ffffff', '11px'));

// WC Femmes
const wcF = createFloor(-4, -10, 3, 3, 0x2a9d8f);
scene.add(wcF);
scene.add(createLabel('🚺 WC', -4, -10, 1.5, '#ffffff', '11px'));

// Douche
const douche = createFloor(0, -10, 3, 3, 0x2a9d8f);
scene.add(douche);
scene.add(createLabel('🚿 DOUCHE', 0, -10, 1.5, '#ffffff', '11px'));

// === MOSQUÉE ===
const mosque = createFloor(18, 0, 8, 6, 0x9b59b6);
scene.add(mosque);
scene.add(createLabel('🕌 MOSQUÉE', 18, 0, 2.0, '#ffffff', '13px'));
scene.add(createWall(18-4, 0, 0.15, 6, WH, 0xbb99cc));
scene.add(createWall(18+4, 0, 0.15, 6, WH, 0xbb99cc));
scene.add(createWall(18, -3, 8, 0.15, WH, 0xbb99cc));
scene.add(createWall(18, 3, 8, 0.15, WH, 0xbb99cc));

// Dôme mosquée
const dome = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 16, 16, 0, Math.PI*2, 0, Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0xc9a84c, metalness: 0.7, roughness: 0.3 })
);
dome.position.set(18, 3.5, 0);
scene.add(dome);

// Minaret
const minaret = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 4),
    new THREE.MeshStandardMaterial({ color: 0xbbaa99 })
);
minaret.position.set(22, 2, 0);
scene.add(minaret);

// === ZONE CARBURANT ===
// Borne de recharge électrique
const borne = createFloor(15, 8, 4, 3, 0xe9c46a);
scene.add(borne);
scene.add(createLabel('🔌 BORNE RECHARGE\nÉLECTRIQUE', 15, 8, 1.5, '#ffffff', '11px'));

// Forage
const forage = createFloor(15, 12, 4, 3, 0x0077b6);
scene.add(forage);
scene.add(createLabel('🛢️ FORAGE', 15, 12, 1.5, '#ffffff', '11px'));

// Graissage PL + Réserve Lubs (x2)
const graissage1 = createFloor(12, -8, 6, 4, 0xe9c46a);
scene.add(graissage1);
scene.add(createLabel('🔧 GRAISSAGE PL\nRÉSERVE LUBS', 12, -8, 1.5, '#ffffff', '11px'));

const graissage2 = createFloor(12, -3, 6, 4, 0xe9c46a);
scene.add(graissage2);
scene.add(createLabel('🔧 GRAISSAGE PL\nRÉSERVE LUBS', 12, -3, 1.5, '#ffffff', '11px'));

// === MURS EXTÉRIEURS BÂTIMENT PRINCIPAL ===
scene.add(createWall(-10, 2, 20, 0.2, WH, 0x8899bb));
scene.add(createWall(10, 2, 0.2, 16, WH, 0x8899bb));
scene.add(createWall(0, -6, 20, 0.2, WH, 0x8899bb));
scene.add(createWall(0, 18, 20, 0.2, WH, 0x8899bb));

// === LABELS ===
scene.add(createLabel('STATION TOTAL - RDC', 0, 20, 0.2, '#ff6b00', '18px'));
scene.add(createLabel('PROJET DE CONSTRUCTION D\'UNE ESSENCERIE (TotalEnergies)', 0, 18.5, 0.2, '#ffffff', '11px'));
scene.add(createLabel('MARS 2025 | G2BI | AMC Services', 0, 17, 0.2, '#aaaaaa', '10px'));

// === ANIMATION ===
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('✅ Station Total - RDC chargé !');
</script>
</body>
</html>
