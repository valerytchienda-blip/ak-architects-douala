<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Total - Étage 2 - Bureaux - 3D</title>
<style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        border-left: 4px solid #ff6b00;
    }
    #legend {
        position: absolute;
        bottom: 30px;
        left: 30px;
        background: rgba(0,0,0,0.85);
        color: white;
        padding: 15px 20px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 12px;
        max-width: 280px;
    }
    #legend h3 { margin: 0 0 8px 0; color: #ff6b00; }
    #legend .item { display: flex; align-items: center; margin: 3px 0; }
    #legend .color-box { width: 14px; height: 14px; margin-right: 8px; border-radius: 3px; }
    #controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        z-index: 10;
        font-size: 12px;
        text-align: center;
    }
    #controls span { opacity: 0.7; }
</style>
</head>
<body>
<div id="info">
    <h2 style="margin:0; color:#ff6b00;">⛽ Station Total - Étage 2</h2>
    <p style="margin:5px 0 0 0; opacity:0.8;">Bureaux - 263,51 m² | Plan 3D interactif</p>
</div>
<div id="legend">
    <h3>🏢 Légende</h3>
    <div class="item"><div class="color-box" style="background:#4a90d9;"></div> Bureaux</div>
    <div class="item"><div class="color-box" style="background:#50c878;"></div> Direction (DG/PDG)</div>
    <div class="item"><div class="color-box" style="background:#f5a623;"></div> Accueil / Réception</div>
    <div class="item"><div class="color-box" style="background:#d0021b;"></div> RH / Archives</div>
    <div class="item"><div class="color-box" style="background:#9b59b6;"></div> Toilettes</div>
    <div class="item"><div class="color-box" style="background:#8b4513;"></div> Mobilier (bureaux)</div>
</div>
<div id="controls">
    <span>🖱 Souris : Tourner | Molette : Zoom | Clic droit : Pan</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// --- Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(20, 18, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 5;
controls.maxDistance = 50;
controls.target.set(0, 0, 0);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(15, 25, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-10, 10, -10);
scene.add(fillLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1a, 0.4);
scene.add(hemiLight);

// --- Grid helper ---
const gridHelper = new THREE.GridHelper(30, 20, 0x444466, 0x333355);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

// ==========================================
// CONFIGURATION DU PLAN (en mètres)
// ==========================================
// Échelle: 1 unité PDF ≈ 1 cm, donc diviser par 100 pour avoir des mètres
// Dimensions approximatives du bâtiment: ~28.5m x ~9.5m

const scale = 0.01; // conversion cm -> mètres

// Fonction utilitaire pour créer un mur
function createWall(x, z, width, depth, height = 2.8, color = 0xcccccc) {
    const geo = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.7,
        metalness: 0.1,
        transparent: true,
        opacity: 0.85
    });
    const wall = new THREE.Mesh(geo, mat);
    wall.position.set(x, height/2, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    return wall;
}

// Fonction pour créer le sol d'une pièce
function createFloor(x, z, width, depth, color, label = '') {
    const geo = new THREE.BoxGeometry(width, 0.05, depth);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.8,
        metalness: 0.1
    });
    const floor = new THREE.Mesh(geo, mat);
    floor.position.set(x, 0, z);
    floor.receiveShadow = true;
    return floor;
}

// Fonction pour créer un bureau
function createDesk(x, z, rotation = 0, color = 0x8b4513) {
    const group = new THREE.Group();
    
    // Plateau
    const topGeo = new THREE.BoxGeometry(1.4, 0.04, 0.7);
    const topMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.2 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.set(0, 0.74, 0);
    top.castShadow = true;
    top.receiveShadow = true;
    group.add(top);
    
    // Pieds
    const legMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.3 });
    const legPositions = [[-0.6, -0.3], [-0.6, 0.3], [0.6, -0.3], [0.6, 0.3]];
    for (const [lx, lz] of legPositions) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.72), legMat);
        leg.position.set(lx, 0.36, lz);
        group.add(leg);
    }
    
    group.position.set(x, 0, z);
    group.rotation.y = rotation;
    return group;
}

// Fonction pour créer une chaise
function createChair(x, z, rotation = 0) {
    const group = new THREE.Group();
    
    // Assise
    const seat = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.04, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.8 })
    );
    seat.position.set(0, 0.44, 0);
    seat.castShadow = true;
    group.add(seat);
    
    // Dossier
    const back = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.4, 0.04),
        new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.8 })
    );
    back.position.set(0, 0.64, -0.2);
    group.add(back);
    
    // Pied central
    const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.03, 0.42),
        new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 })
    );
    pole.position.set(0, 0.21, 0);
    group.add(pole);
    
    // Base
    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.25, 0.02),
        new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6 })
    );
    base.position.set(0, 0.01, 0);
    group.add(base);
    
    group.position.set(x, 0, z);
    group.rotation.y = rotation;
    return group;
}

// Fonction pour créer un label 3D
function createLabel(text, x, z, y = 1.5, color = '#ffffff', size = '14px') {
    const div = document.createElement('div');
    div.textContent = text;
    div.style.color = color;
    div.style.fontFamily = 'Arial, sans-serif';
    div.style.fontSize = size;
    div.style.fontWeight = 'bold';
    div.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
    div.style.background = 'rgba(0,0,0,0.6)';
    div.style.padding = '4px 10px';
    div.style.borderRadius = '6px';
    div.style.border = '1px solid rgba(255,255,255,0.2)';
    div.style.backdropFilter = 'blur(4px)';
    
    const label = new CSS2DObject(div);
    label.position.set(x, y, z);
    return label;
}

// ==========================================
// CONSTRUCTION DU BÂTIMENT
// ==========================================
// Coordonnées converties en mètres (division par 100)
// Le bâtiment fait environ 28.5m x 9.5m

const WALL_HEIGHT = 2.8;
const WALL_COLOR = 0xcccccc;
const WALL_COLOR_ACCENT = 0xbbbbdd;

// Dimensions des pièces (en mètres, approximatives d'après le plan)
// De gauche à droite:

// Pièce 1: Bureau 1 + RH (gauche)
// Pièce 2: Bureau 2 DFC
// Pièce 3: Accueil + Assistante DG + DG
// Pièce 4: Archives
// Pièce 5: Toilettes
// Pièce 6: Accueil assistante PDG
// Pièce 7: Bureau PDG

// Définition des pièces: {nom, x, z, w, d, couleur, hauteur_label}
const rooms = [
    { nom: "Bureau 1", x: -9.5, z: -3.0, w: 3.0, d: 3.5, color: 0x4a90d9, labelY: 2.0 },
    { nom: "RH", x: -9.5, z: 1.5, w: 3.0, d: 3.5, color: 0xd0021b, labelY: 2.0 },
    { nom: "Bureau 2\nDFC", x: -5.0, z: 0.0, w: 4.5, d: 7.5, color: 0x4a90d9, labelY: 2.0 },
    { nom: "Accueil\nAssistante DG", x: -9.5, z: -3.0, w: 3.0, d: 3.5, color: 0xf5a623, labelY: 2.0 }, // superposé
    { nom: "DG", x: -5.0, z: -3.5, w: 2.0, d: 2.5, color: 0x50c878, labelY: 2.0 },
    { nom: "Archives", x: 0.5, z: -3.0, w: 2.5, d: 3.5, color: 0xd0021b, labelY: 2.0 },
    { nom: "Toilettes", x: 0.5, z: 1.5, w: 2.5, d: 3.5, color: 0x9b59b6, labelY: 2.0 },
    { nom: "Accueil\nAssistante PDG", x: 4.5, z: 0.0, w: 4.0, d: 7.5, color: 0xf5a623, labelY: 2.0 },
    { nom: "Bureau\nPDG", x: 9.0, z: 0.0, w: 4.5, d: 7.5, color: 0x50c878, labelY: 2.0 }
];

// Reconstruction plus précise basée sur l'analyse du plan
// Layout réel du plan:
// 
// Rangée haute (z négatif): Bureau 1 | (vide/couloir) | Bureau 2 DFC | Archives | Accueil PDG | Bureau PDG
// Rangée basse (z positif): RH | Accueil/DG | (couloir) | Toilettes | Accueil PDG (suite) | Bureau PDG (suite)

const buildingWidth = 28.5;
const buildingDepth = 9.5;

// Sol principal
const mainFloor = new THREE.Mesh(
    new THREE.BoxGeometry(buildingWidth, 0.08, buildingDepth),
    new THREE.MeshStandardMaterial({ 
        color: 0x2a2a3e, 
        roughness: 0.9, 
        metalness: 0.1,
        transparent: true,
        opacity: 0.5
    })
);
mainFloor.position.set(0, -0.04, 0);
mainFloor.receiveShadow = true;
scene.add(mainFloor);

// Murs extérieurs
const extWallMat = new THREE.MeshStandardMaterial({ color: 0x8899bb, roughness: 0.6, metalness: 0.2 });

// Mur avant (z négatif)
scene.add(createWall(0, -buildingDepth/2, buildingWidth, 0.15, WALL_HEIGHT, 0x8899bb));
// Mur arrière (z positif)
scene.add(createWall(0, buildingDepth/2, buildingWidth, 0.15, WALL_HEIGHT, 0x8899bb));
// Mur gauche (x négatif)
scene.add(createWall(-buildingWidth/2, 0, 0.15, buildingDepth, WALL_HEIGHT, 0x8899bb));
// Mur droit (x positif)
scene.add(createWall(buildingWidth/2, 0, 0.15, buildingDepth, WALL_HEIGHT, 0x8899bb));

// ==========================================
// CRÉATION DES PIÈCES AVEC SOLS COLORÉS
// ==========================================

// Définition précise des pièces avec leurs dimensions réelles
// Basé sur les positions des textes dans le PDF

const roomData = [
    // {nom, x_center, z_center, width, depth, color, labelY}
    { nom: "Bureau 1", x: -10.0, z: -2.5, w: 3.2, d: 3.2, color: 0x4a90d9, labelY: 2.2 },
    { nom: "RH", x: -10.0, z: 1.5, w: 3.2, d: 3.2, color: 0xe74c3c, labelY: 2.2 },
    { nom: "Bureau 2\nDFC", x: -5.5, z: 0.0, w: 5.0, d: 7.0, color: 0x4a90d9, labelY: 2.2 },
    { nom: "Accueil\nAssistante DG", x: -10.0, z: -2.5, w: 3.2, d: 3.2, color: 0xf5a623, labelY: 2.2 },
    { nom: "DG", x: -5.5, z: -2.8, w: 2.5, d: 2.5, color: 0x50c878, labelY: 2.2 },
    { nom: "Archives", x: 0.5, z: -2.5, w: 3.0, d: 3.2, color: 0xe74c3c, labelY: 2.2 },
    { nom: "Toilettes", x: 0.5, z: 1.8, w: 3.0, d: 3.0, color: 0x9b59b6, labelY: 2.2 },
    { nom: "Accueil\nAssistante PDG", x: 5.0, z: 0.0, w: 5.0, d: 7.0, color: 0xf5a623, labelY: 2.2 },
    { nom: "Bureau\nPDG", x: 10.0, z: 0.0, w: 5.0, d: 7.0, color: 0x50c878, labelY: 2.2 }
];

// Créer les sols des pièces
for (const room of roomData) {
    const floor = createFloor(room.x, room.z, room.w, room.d, room.color);
    scene.add(floor);
    
    // Ajouter un effet de carrelage (lignes fines)
    const tileMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
    for (let i = -room.w/2 + 0.3; i < room.w/2; i += 0.6) {
        const points = [
            new THREE.Vector3(room.x + i, 0.03, room.z - room.d/2),
            new THREE.Vector3(room.x + i, 0.03, room.z + room.d/2)
        ];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        scene.add(new THREE.Line(geo, tileMat));
    }
    for (let i = -room.d/2 + 0.3; i < room.d/2; i += 0.6) {
        const points = [
            new THREE.Vector3(room.x - room.w/2, 0.03, room.z + i),
            new THREE.Vector3(room.x + room.w/2, 0.03, room.z + i)
        ];
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        scene.add(new THREE.Line(geo, tileMat));
    }
    
    // Ajouter le label
    const label = createLabel(room.nom, room.x, room.z, room.labelY, '#ffffff', '16px');
    scene.add(label);
}

// ==========================================
// MURS INTÉRIEURS
// ==========================================
const intWallMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.7 });

// Murs horizontaux (selon l'axe X)
const hWalls = [
    // Grand mur horizontal au milieu
    { x: -3.0, z: 0.5, w: 8.0, d: 0.1 },
    // Séparation Bureau 1 / RH
    { x: -10.0, z: -0.9, w: 3.2, d: 0.1 },
    // Séparation Archives / Toilettes
    { x: 0.5, z: -0.9, w: 3.0, d: 0.1 },
    // Séparation DG / reste
    { x: -4.2, z: -1.5, w: 0.1, d: 2.0 },
];

// Murs verticaux (selon l'axe Z)
const vWalls = [
    // Séparation Bureau 1 / Bureau 2 DFC
    { x: -8.0, z: -2.5, w: 0.1, d: 3.2 },
    // Séparation RH / couloir
    { x: -8.0, z: 1.5, w: 0.1, d: 3.2 },
    // Séparation Bureau 2 DFC / Archives
    { x: -2.5, z: -2.5, w: 0.1, d: 3.2 },
    // Séparation Bureau 2 DFC / Toilettes
    { x: -2.5, z: 1.8, w: 0.1, d: 3.0 },
    // Séparation Archives / Accueil PDG
    { x: 2.5, z: -2.5, w: 0.1, d: 3.2 },
    // Séparation Toilettes / Accueil PDG
    { x: 2.5, z: 1.8, w: 0.1, d: 3.0 },
    // Séparation Accueil PDG / Bureau PDG
    { x: 7.5, z: 0.0, w: 0.1, d: 7.0 },
];

for (const w of hWalls) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, WALL_HEIGHT, w.d), intWallMat);
    wall.position.set(w.x, WALL_HEIGHT/2, w.z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
}

for (const w of vWalls) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, WALL_HEIGHT, w.d), intWallMat);
    wall.position.set(w.x, WALL_HEIGHT/2, w.z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
}

// ==========================================
// MOBILIER
// ==========================================

// Bureaux par pièce
const deskColor = 0x8b4513;
const deskColorLight = 0xa0522d;

// Bureau 1 - 2 bureaux
scene.add(createDesk(-10.8, -2.8, 0, deskColor));
scene.add(createChair(-10.8, -2.2, Math.PI));
scene.add(createDesk(-9.2, -2.8, 0, deskColorLight));
scene.add(createChair(-9.2, -2.2, Math.PI));

// RH - 1 bureau
scene.add(createDesk(-10.8, 1.8, 0, deskColor));
scene.add(createChair(-10.8, 2.4, Math.PI));

// Bureau 2 DFC - 2 bureaux
scene.add(createDesk(-6.5, -1.5, 0, deskColor));
scene.add(createChair(-6.5, -0.9, Math.PI));
scene.add(createDesk(-4.5, -1.5, 0, deskColorLight));
scene.add(createChair(-4.5, -0.9, Math.PI));

// DG - 1 grand bureau
const dgDesk = new THREE.Group();
const dgTop = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 0.04, 0.9),
    new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.4, metalness: 0.3 })
);
dgTop.position.set(0, 0.74, 0);
dgTop.castShadow = true;
dgDesk.add(dgTop);
const dgLegMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, metalness: 0.6, roughness: 0.3 });
for (const [lx, lz] of [[-0.8, -0.4], [-0.8, 0.4], [0.8, -0.4], [0.8, 0.4]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.72), dgLegMat);
    leg.position.set(lx, 0.36, lz);
    dgDesk.add(leg);
}
dgDesk.position.set(-5.5, 0, -3.0);
dgDesk.rotation.y = 0;
scene.add(dgDesk);
scene.add(createChair(-5.5, -2.4, Math.PI));

// Archives - étagères
const shelfMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7 });
for (let i = 0; i < 3; i++) {
    const shelf = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 2.0, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7 })
    );
    shelf.position.set(0.5 + (i-1)*0.9, 1.0, -3.5);
    shelf.castShadow = true;
    scene.add(shelf);
    
    // Rayons
    for (let j = 0; j < 3; j++) {
        const ray = new THREE.Mesh(
            new THREE.BoxGeometry(0.75, 0.02, 0.35),
            new THREE.MeshStandardMaterial({ color: 0xa08060, roughness: 0.8 })
        );
        ray.position.set(0.5 + (i-1)*0.9, 0.4 + j*0.6, -3.5);
        scene.add(ray);
    }
}

// Accueil Assistante PDG - 1 bureau
scene.add(createDesk(5.0, -1.5, 0, deskColor));
scene.add(createChair(5.0, -0.9, Math.PI));

// Bureau PDG - 1 grand bureau
const pdgDesk = new THREE.Group();
const pdgTop = new THREE.Mesh(
    new THREE.BoxGeometry(2.0, 0.04, 1.0),
    new THREE.MeshStandardMaterial({ color: 0x3d1f0a, roughness: 0.3, metalness: 0.4 })
);
pdgTop.position.set(0, 0.74, 0);
pdgTop.castShadow = true;
pdgDesk.add(pdgTop);
for (const [lx, lz] of [[-0.9, -0.45], [-0.9, 0.45], [0.9, -0.45], [0.9, 0.45]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.72), dgLegMat);
    leg.position.set(lx, 0.36, lz);
    pdgDesk.add(leg);
}
pdgDesk.position.set(10.0, 0, -1.5);
pdgDesk.rotation.y = 0;
scene.add(pdgDesk);
scene.add(createChair(10.0, -0.9, Math.PI));

// Toilettes - cuvette et lavabo
const wcMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
const wc = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.5), wcMat);
wc.position.set(0.5, 0.2, 2.0);
scene.add(wc);
const wcTank = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.2), wcMat);
wcTank.position.set(0.5, 0.45, 2.25);
scene.add(wcTank);

// Lavabo
const lavabo = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.1, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.2 })
);
lavabo.position.set(0.5, 0.85, 1.5);
scene.add(lavabo);
const mirror = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.4, 0.02),
    new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.9 })
);
mirror.position.set(0.5, 1.1, 1.3);
scene.add(mirror);

// ==========================================
// ÉLÉMENTS DÉCORATIFS
// ==========================================

// Plafond (transparent pour voir l'intérieur)
const ceiling = new THREE.Mesh(
    new THREE.BoxGeometry(buildingWidth - 0.2, 0.05, buildingDepth - 0.2),
    new THREE.MeshStandardMaterial({ 
        color: 0xdddddd, 
        roughness: 0.9, 
        transparent: true, 
        opacity: 0.15 
    })
);
ceiling.position.set(0, WALL_HEIGHT, 0);
scene.add(ceiling);

// Lumières (petits rectangles au plafond)
const lightMat = new THREE.MeshStandardMaterial({ 
    color: 0xffffcc, 
    emissive: 0xffffcc, 
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.8
});
const lightPositions = [
    [-8, 0], [-4, 0], [0, 0], [4, 0], [8, 0],
    [-8, -2.5], [-4, -2.5], [0, -2.5], [4, -2.5], [8, -2.5],
    [-8, 2.5], [-4, 2.5], [0, 2.5], [4, 2.5], [8, 2.5]
];
for (const [lx, lz] of lightPositions) {
    const light = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.03, 0.2), lightMat);
    light.position.set(lx, WALL_HEIGHT - 0.02, lz);
    scene.add(light);
}

// ==========================================
// LABELS SUPPLÉMENTAIRES
// ==========================================

// Surface totale
const surfaceLabel = createLabel('263,51 m²', 0, buildingDepth/2 + 1.0, 0.5, '#ffaa00', '18px');
scene.add(surfaceLabel);

// Titre du plan
const titleLabel = createLabel('ÉTAGE 2 - BUREAUX', 0, buildingDepth/2 + 1.8, 0.2, '#ffffff', '20px');
scene.add(titleLabel);

// ==========================================
// ANIMATION
// ==========================================
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

// ==========================================
// RESIZE
// ==========================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('✅ Visualisation 3D chargée !');
console.log('🏢 Station Total - Étage 2 - Bureaux');
console.log('📐 Surface: 263,51 m²');
</script>
</body>
</html>
