<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa de Luxe - Douala, Afrique - 3D</title>
<style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        border-left: 4px solid #c9a84c;
    }
    #legend {
        position: absolute;
        bottom: 30px;
        left: 30px;
        background: rgba(0,0,0,0.85);
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 11px;
        max-width: 250px;
    }
    #legend h3 { margin: 0 0 6px 0; color: #c9a84c; font-size: 13px; }
    #legend .item { display: flex; align-items: center; margin: 2px 0; }
    #legend .color-box { width: 12px; height: 12px; margin-right: 6px; border-radius: 2px; }
    #controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 15px;
        border-radius: 10px;
        z-index: 10;
        font-size: 11px;
        text-align: center;
    }
</style>
</head>
<body>
<div id="info">
    <h2 style="margin:0; color:#c9a84c;">🏡 Villa de Luxe - Douala, Afrique</h2>
    <p style="margin:5px 0 0 0; opacity:0.8;">AK ARCHITECTS & ASSOCIATES | Plan 3D interactif</p>
</div>
<div id="legend">
    <h3>🏗️ Légende</h3>
    <div class="item"><div class="color-box" style="background:#d4a373;"></div> Salons / Living</div>
    <div class="item"><div class="color-box" style="background:#e9c46a;"></div> Salle à manger</div>
    <div class="item"><div class="color-box" style="background:#f4a261;"></div> Cuisine / Utility</div>
    <div class="item"><div class="color-box" style="background:#e76f51;"></div> Bar / Home Theatre</div>
    <div class="item"><div class="color-box" style="background:#2a9d8f;"></div> SPA / Bien-être</div>
    <div class="item"><div class="color-box" style="background:#264653;"></div> Gym</div>
    <div class="item"><div class="color-box" style="background:#a8dadc;"></div> Piscine / Eau</div>
    <div class="item"><div class="color-box" style="background:#606c38;"></div> Espaces verts</div>
</div>
<div id="controls">
    <span>🖱 Tourner | Molette : Zoom | Clic droit : Pan</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// --- Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 80, 120);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(40, 35, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.maxPolarAngle = Math.PI / 2.3;
controls.minDistance = 10;
controls.maxDistance = 100;
controls.target.set(0, 0, 0);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 4096;
sunLight.shadow.mapSize.height = 4096;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -60;
sunLight.shadow.camera.right = 60;
sunLight.shadow.camera.top = 60;
sunLight.shadow.camera.bottom = -60;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-20, 20, -20);
scene.add(fillLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x8B6914, 0.6);
scene.add(hemiLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(120, 100);
const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x3a4a2a, 
    roughness: 0.9, 
    metalness: 0.0 
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.05, 0);
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(100, 30, 0x556644, 0x445533);
gridHelper.position.y = 0;
scene.add(gridHelper);

// --- Helper functions ---
function createWall(x, z, w, d, h = 3.0, color = 0xcccccc, opacity = 0.85) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1, transparent: true, opacity });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    wall.position.set(x, h/2, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    return wall;
}

function createFloor(x, z, w, d, color, h = 0.05) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 });
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    floor.position.set(x, 0, z);
    floor.receiveShadow = true;
    return floor;
}

function createLabel(text, x, z, y = 2.0, color = '#ffffff', size = '13px') {
    const div = document.createElement('div');
    div.textContent = text;
    div.style.color = color;
    div.style.fontFamily = 'Arial, sans-serif';
    div.style.fontSize = size;
    div.style.fontWeight = 'bold';
    div.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
    div.style.background = 'rgba(0,0,0,0.6)';
    div.style.padding = '3px 8px';
    div.style.borderRadius = '5px';
    div.style.border = '1px solid rgba(255,255,255,0.15)';
    div.style.backdropFilter = 'blur(3px)';
    div.style.pointerEvents = 'none';
    const label = new CSS2DObject(div);
    label.position.set(x, y, z);
    return label;
}

// ==========================================
// VILLA CONSTRUCTION
// ==========================================
// Dimensions en mètres (converties de mm)
// Villa principale centrée autour de (0, 0)

const WALL_H = 3.5;
const WALL_C = 0xccbbaa;

// === TERRRAIN / SITE ===
// Padel Court (haut du plan, z négatif)
const padel = createFloor(-15, -30, 20, 10, 0x2d6a4f);
scene.add(padel);
const padelLabel = createLabel('🏟️ PADEL COURT', -15, -30, 0.5, '#90e0ef', '14px');
scene.add(padelLabel);

// Services/Utility area
const utility = createFloor(-30, -28, 12, 8, 0x6c757d);
scene.add(utility);
const utilLabel = createLabel('🔧 SERVICES', -30, -28, 0.5, '#ffffff', '12px');
scene.add(utilLabel);

// STP Area
const stp = createFloor(-30, -20, 8, 6, 0x495057);
scene.add(stp);
const stpLabel = createLabel('💧 STP', -30, -20, 0.5, '#ffffff', '12px');
scene.add(stpLabel);

// Bar Shack
const barShack = createFloor(10, -32, 8, 6, 0xd4a373);
scene.add(barShack);
const bsLabel = createLabel('🍸 BAR SHACK', 10, -32, 0.5, '#ffffff', '12px');
scene.add(bsLabel);

// Open Lawn / Seating
const lawn = createFloor(25, -25, 15, 12, 0x606c38);
scene.add(lawn);
const lawnLabel = createLabel('🌿 OPEN LAWN', 25, -25, 0.5, '#ffffff', '12px');
scene.add(lawnLabel);

// Water Body
const water = createFloor(5, -15, 12, 6, 0x0077b6);
scene.add(water);
const waterLabel = createLabel('💧 WATER BODY', 5, -15, 0.5, '#90e0ef', '12px');
scene.add(waterLabel);

// Main Entrance
const entrance = createFloor(-25, -10, 8, 4, 0xb08968);
scene.add(entrance);
const entLabel = createLabel('🚗 MAIN ENTRANCE', -25, -10, 0.5, '#ffffff', '12px');
scene.add(entLabel);

// Covered Parking
const parking = createFloor(-20, 12, 12, 8, 0x6c757d);
scene.add(parking);
const parkLabel = createLabel('🚘 PARKING', -20, 12, 0.5, '#ffffff', '12px');
scene.add(parkLabel);

// Pool Area
const pool = createFloor(20, 5, 15, 10, 0x00b4d8);
scene.add(pool);
const poolLabel = createLabel('🏊 POOL AREA', 20, 5, 0.5, '#caf0f8', '14px');
scene.add(poolLabel);

// === VILLA PRINCIPALE ===
// La villa est organisée en plusieurs blocs

// Guest House (partie gauche)
const guestHouse = createFloor(-15, 5, 12, 10, 0xd4a373);
scene.add(guestHouse);
scene.add(createWall(-15 - 6, 5, 0.15, 10, WALL_H, WALL_C));
scene.add(createWall(-15 + 6, 5, 0.15, 10, WALL_H, WALL_C));
scene.add(createWall(-15, 5 - 5, 12, 0.15, WALL_H, WALL_C));
scene.add(createWall(-15, 5 + 5, 12, 0.15, WALL_H, WALL_C));

const ghLabel = createLabel('🏠 GUEST HOUSE', -15, 5, 2.5, '#ffffff', '14px');
scene.add(ghLabel);

// Bedroom-1 (5.2 x 4.0 m)
const bdrm1 = createFloor(-15, -3, 5.2, 4.0, 0xd4a373);
scene.add(bdrm1);
const bdrm1Label = createLabel('🛏️ BEDROOM-1', -15, -3, 1.5, '#ffffff', '12px');
scene.add(bdrm1Label);

// Toilet (4.0 x 2.75 m)
const toilet1 = createFloor(-15, -7.5, 4.0, 2.75, 0xade8f4);
scene.add(toilet1);
const t1Label = createLabel('🚽 TOILET', -15, -7.5, 1.5, '#ffffff', '11px');
scene.add(t1Label);

// Living (Guest) (4.475 x 4.9 m)
const livingG = createFloor(-8, -3, 4.475, 4.9, 0xd4a373);
scene.add(livingG);

// === GRAND BLOC CENTRAL ===

// Grand Living (10 x 14 m)
const grandLiving = createFloor(8, -5, 10, 14, 0xd4a373);
scene.add(grandLiving);
scene.add(createWall(8 - 5, -5, 0.15, 14, WALL_H, WALL_C));
scene.add(createWall(8 + 5, -5, 0.15, 14, WALL_H, WALL_C));
scene.add(createWall(8, -5 - 7, 10, 0.15, WALL_H, WALL_C));
scene.add(createWall(8, -5 + 7, 10, 0.15, WALL_H, WALL_C));
const glLabel = createLabel('🛋️ GRAND LIVING\n10 000 x 14 010', 8, -5, 2.5, '#ffffff', '13px');
scene.add(glLabel);

// Living Area (13.2 x 8 m)
const livingMain = createFloor(8, 10, 13.2, 8, 0xd4a373);
scene.add(livingMain);
scene.add(createWall(8 - 6.6, 10, 0.15, 8, WALL_H, WALL_C));
scene.add(createWall(8 + 6.6, 10, 0.15, 8, WALL_H, WALL_C));
scene.add(createWall(8, 10 - 4, 13.2, 0.15, WALL_H, WALL_C));
scene.add(createWall(8, 10 + 4, 13.2, 0.15, WALL_H, WALL_C));
const lvLabel = createLabel('🛋️ LIVING AREA\n13 230 x 8 000', 8, 10, 2.5, '#ffffff', '13px');
scene.add(lvLabel);

// Dining Area (7 x 10 m)
const dining = createFloor(0, 10, 7, 10, 0xe9c46a);
scene.add(dining);
const dinLabel = createLabel('🍽️ DINING AREA\n7 000 x 10 000', 0, 10, 2.5, '#ffffff', '13px');
scene.add(dinLabel);

// Kitchen + Utility (6 x 7.3 m)
const kitchen = createFloor(-8, 10, 6, 7.3, 0xf4a261);
scene.add(kitchen);
const kitLabel = createLabel('🍳 KITCHEN\n+ UTILITY', -8, 10, 2.5, '#ffffff', '12px');
scene.add(kitLabel);

// Tech Room (6 x 3.46 m)
const tech = createFloor(-8, 15, 6, 3.46, 0x6c757d);
scene.add(tech);
const techLabel = createLabel('🔧 TECH. ROOM', -8, 15, 1.5, '#ffffff', '11px');
scene.add(techLabel);

// Home Theatre (7.42 x 6.1 m)
const theatre = createFloor(18, -12, 7.42, 6.1, 0xe76f51);
scene.add(theatre);
const thLabel = createLabel('🎬 HOME THEATRE\n7 420 x 6 100', 18, -12, 2.5, '#ffffff', '12px');
scene.add(thLabel);

// Bar Area (9.635 x 6.7 m)
const bar = createFloor(18, -3, 9.635, 6.7, 0xe76f51);
scene.add(bar);
const barLabel = createLabel('🍷 BAR AREA\n9 635 x 6 700', 18, -3, 2.5, '#ffffff', '12px');
scene.add(barLabel);

// === SPA & WELLNESS ZONE ===
// Hammam (2.435 x 3.0)
const hammam = createFloor(25, 5, 2.435, 3.0, 0x2a9d8f);
scene.add(hammam);
const hamLabel = createLabel('🧖 HAMMAM', 25, 5, 1.5, '#ffffff', '11px');
scene.add(hamLabel);

// Message Area (2.57 x 3.0)
const message = createFloor(25, 9, 2.57, 3.0, 0x2a9d8f);
scene.add(message);
const msgLabel = createLabel('💆 MASSAGE', 25, 9, 1.5, '#ffffff', '11px');
scene.add(msgLabel);

// Sauna/Steam (2.435 x 2.7)
const sauna = createFloor(28, 5, 2.435, 2.7, 0x2a9d8f);
scene.add(sauna);
const sauLabel = createLabel('🧖‍♂️ SAUNA', 28, 5, 1.5, '#ffffff', '11px');
scene.add(sauLabel);

// Changing Room (2.57 x 2.7)
const changing = createFloor(28, 9, 2.57, 2.7, 0x2a9d8f);
scene.add(changing);
const chgLabel = createLabel('👔 CHANGING', 28, 9, 1.5, '#ffffff', '11px');
scene.add(chgLabel);

// Gym Area (4.4 x 8.73)
const gym = createFloor(25, -8, 4.4, 8.73, 0x264653);
scene.add(gym);
const gymLabel = createLabel('🏋️ GYM AREA\n4 400 x 8 730', 25, -8, 2.5, '#ffffff', '12px');
scene.add(gymLabel);

// Foyer (5 x 3.5)
const foyer = createFloor(0, 0, 5, 3.5, 0xb08968);
scene.add(foyer);
const foyLabel = createLabel('🚪 FOYER', 0, 0, 1.5, '#ffffff', '12px');
scene.add(foyLabel);

// Lift (2 x 2)
const lift = createFloor(3, 2, 2, 2, 0xadb5bd);
scene.add(lift);
const liftLabel = createLabel('🛗 LIFT', 3, 2, 1.5, '#ffffff', '11px');
scene.add(liftLabel);

// PWD Rooms
const pwd1 = createFloor(-8, -7, 2.1, 3.0, 0xade8f4);
scene.add(pwd1);
const pwd2 = createFloor(18, 10, 4.0, 2.6, 0xade8f4);
scene.add(pwd2);
const pwd3 = createFloor(3, -3, 2.1, 3.0, 0xade8f4);
scene.add(pwd3);

// === MURS EXTÉRIEURS DE LA VILLA ===
// Périmètre approximatif
const villaW = 40;
const villaD = 30;
scene.add(createWall(-villaW/2, 0, 0.2, villaD, WALL_H, 0xbbaa99, 0.3));
scene.add(createWall(villaW/2, 0, 0.2, villaD, WALL_H, 0xbbaa99, 0.3));
scene.add(createWall(0, -villaD/2, villaW, 0.2, WALL_H, 0xbbaa99, 0.3));
scene.add(createWall(0, villaD/2, villaW, 0.2, WALL_H, 0xbbaa99, 0.3));

// === DÉCORATION ===
// Palmiers (petits cones)
function createTree(x, z, scale = 1) {
    const group = new THREE.Group();
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1 * scale, 0.2 * scale, 1.5 * scale),
        new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.9 })
    );
    trunk.position.y = 0.75 * scale;
    trunk.castShadow = true;
    group.add(trunk);
    
    const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(0.8 * scale, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.8 })
    );
    leaves.position.y = 1.8 * scale;
    leaves.scale.y = 0.6;
    leaves.castShadow = true;
    group.add(leaves);
    
    group.position.set(x, 0, z);
    return group;
}

const treePositions = [
    [-5, -12], [5, -12], [-10, 20], [10, 20], 
    [30, -15], [30, 0], [30, 15],
    [-20, -15], [-20, 20], [-30, -5],
    [15, -20], [-15, -20]
];
for (const [tx, tz] of treePositions) {
    scene.add(createTree(tx, tz, 0.8 + Math.random() * 0.5));
}

// Piscine (eau)
const poolWater = createFloor(20, 5, 12, 7, 0x0077b6, 0.1);
scene.add(poolWater);

// === LABELS SUPPLÉMENTAIRES ===
const titleLabel = createLabel('VILLA AT DOULA, AFRICA', 0, 25, 0.2, '#c9a84c', '20px');
scene.add(titleLabel);

const archLabel = createLabel('AK ARCHITECTS & ASSOCIATES | AR. AKANSHA MALIK', 0, 23, 0.2, '#ffffff', '12px');
scene.add(archLabel);

const dimLabel = createLabel('Dimensions en millimètres | Version R4 - 07/05/2026', 0, 21, 0.2, '#aaaaaa', '11px');
scene.add(dimLabel);

// === ANIMATION ===
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('✅ Villa de Luxe - Douala - 3D chargée !');
</script>
</body>
</html>
