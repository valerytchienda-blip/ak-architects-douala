<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Total - 1er Étage - Bureaux - Plan 3D</title>
<style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px 25px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 14px;
        border-left: 4px solid #ff6b00;
    }
    #legend {
        position: absolute;
        bottom: 30px;
        left: 30px;
        background: rgba(0,0,0,0.85);
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        font-size: 11px;
        max-width: 280px;
    }
    #legend h3 { margin: 0 0 6px 0; color: #ff6b00; font-size: 13px; }
    #legend .item { display: flex; align-items: center; margin: 2px 0; }
    #legend .color-box { width: 12px; height: 12px; margin-right: 6px; border-radius: 2px; }
    #controls {
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 15px;
        border-radius: 10px;
        z-index: 10;
        font-size: 11px;
        text-align: center;
    }
</style>
</head>
<body>
<div id="info">
    <h2 style="margin:0; color:#ff6b00;">⛽ Station Total - 1er Étage</h2>
    <p style="margin:5px 0 0 0; opacity:0.8;">Bureaux - Accueil, Réunion, QHSE, Agence Marine | Plan 3D</p>
</div>
<div id="legend">
    <h3>🏗️ Légende 1er Étage</h3>
    <div class="item"><div class="color-box" style="background:#4a90d9;"></div> Bureaux</div>
    <div class="item"><div class="color-box" style="background:#f5a623;"></div> Accueil / Réception</div>
    <div class="item"><div class="color-box" style="background:#50c878;"></div> Salle de Réunion</div>
    <div class="item"><div class="color-box" style="background:#d0021b;"></div> Archives / Reprographie</div>
    <div class="item"><div class="color-box" style="background:#9b59b6;"></div> Sanitaires</div>
    <div class="item"><div class="color-box" style="background:#6c757d;"></div> Circulations / SAS</div>
</div>
<div id="controls">
    <span>🖱 Tourner | Molette : Zoom | Clic droit : Pan</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(25, 22, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.target.set(0, 0, 0);

const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 4096;
sunLight.shadow.mapSize.height = 4096;
scene.add(sunLight);
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-20, 20, -20);
scene.add(fillLight);
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1a, 0.5);
scene.add(hemiLight);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 50),
    new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, -0.05, 0);
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(50, 25, 0x444466, 0x333355);
grid.position.y = 0;
scene.add(grid);

function createFloor(x, z, w, d, color, h = 0.05) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 });
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    floor.position.set(x, 0, z);
    floor.receiveShadow = true;
    return floor;
}

function createWall(x, z, w, d, h = 3.0, color = 0xcccccc, opacity = 0.8) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1, transparent: true, opacity });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    wall.position.set(x, h/2, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    return wall;
}

function createLabel(text, x, z, y = 1.8, color = '#ffffff', size = '12px') {
    const div = document.createElement('div');
    div.textContent = text;
    div.style.color = color;
    div.style.fontFamily = 'Arial, sans-serif';
    div.style.fontSize = size;
    div.style.fontWeight = 'bold';
    div.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
    div.style.background = 'rgba(0,0,0,0.6)';
    div.style.padding = '3px 8px';
    div.style.borderRadius = '5px';
    div.style.border = '1px solid rgba(255,255,255,0.15)';
    div.style.backdropFilter = 'blur(3px)';
    div.style.pointerEvents = 'none';
    const label = new CSS2DObject(div);
    label.position.set(x, y, z);
    return label;
}

function createDesk(x, z, rot = 0, color = 0x8b4513) {
    const g = new THREE.Group();
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.04, 0.7), new THREE.MeshStandardMaterial({ color, roughness: 0.6 }));
    top.position.set(0, 0.74, 0); top.castShadow = true; g.add(top);
    const lm = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8 });
    for (const [lx,lz] of [[-0.6,-0.3],[-0.6,0.3],[0.6,-0.3],[0.6,0.3]]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.72), lm);
        leg.position.set(lx, 0.36, lz); g.add(leg);
    }
    g.position.set(x, 0, z); g.rotation.y = rot;
    return g;
}

function createChair(x, z, rot = 0) {
    const g = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.8 });
    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.04,0.4), mat);
    seat.position.set(0,0.44,0); g.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.04), mat);
    back.position.set(0,0.64,-0.2); g.add(back);
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.03,0.42), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 }));
    pole.position.set(0,0.21,0); g.add(pole);
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,0.02), new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.6 }));
    base.position.set(0,0.01,0); g.add(base);
    g.position.set(x, 0, z); g.rotation.y = rot;
    return g;
}

const WH = 3.0;
const WC = 0xcccccc;

// ==========================================
// 1ER ÉTAGE - BUREAUX
// ==========================================

// === MUR EXTÉRIEUR ===
const bw = 24, bd = 16;
scene.add(createWall(0, -bd/2, bw, 0.15, WH, 0x8899bb));
scene.add(createWall(0, bd/2, bw, 0.15, WH, 0x8899bb));
scene.add(createWall(-bw/2, 0, 0.15, bd, WH, 0x8899bb));
scene.add(createWall(bw/2, 0, 0.15, bd, WH, 0x8899bb));

// === REPROGRAPHIE (12,76 m²) ===
const repro = createFloor(-8, -5, 5, 3.5, 0xd0021b);
scene.add(repro);
scene.add(createLabel('📄 REPROGRAPHIE\n12,76 m²', -8, -5, 2.0, '#ffffff', '12px'));
scene.add(createWall(-8-2.5, -5, 0.1, 3.5, WH, WC));
scene.add(createWall(-8+2.5, -5, 0.1, 3.5, WH, WC));
scene.add(createWall(-8, -5-1.75, 5, 0.1, WH, WC));
scene.add(createWall(-8, -5+1.75, 5, 0.1, WH, WC));

// === ARCHIVES (7,14 m²) ===
const arch = createFloor(-8, 0, 4, 2.5, 0xd0021b);
scene.add(arch);
scene.add(createLabel('📦 ARCHIVES\n7,14 m²', -8, 0, 2.0, '#ffffff', '12px'));

// === ESPACE 1 (66,39 m²) ===
const esp1 = createFloor(0, -4, 8, 6, 0x4a90d9);
scene.add(esp1);
scene.add(createLabel('🏢 ESPACE 1\n66,39 m²', 0, -4, 2.0, '#ffffff', '13px'));
// Murs
scene.add(createWall(-4, -4, 0.1, 6, WH, WC));
scene.add(createWall(4, -4, 0.1, 6, WH, WC));
scene.add(createWall(0, -7, 8, 0.1, WH, WC));
scene.add(createWall(0, -1, 8, 0.1, WH, WC));

// === ESPACE 2 (78,21 m²) ===
const esp2 = createFloor(0, 5, 8, 7, 0x4a90d9);
scene.add(esp2);
scene.add(createLabel('🏢 ESPACE 2\n78,21 m²', 0, 5, 2.0, '#ffffff', '13px'));
scene.add(createWall(-4, 5, 0.1, 7, WH, WC));
scene.add(createWall(4, 5, 0.1, 7, WH, WC));
scene.add(createWall(0, 1.5, 8, 0.1, WH, WC));
scene.add(createWall(0, 8.5, 8, 0.1, WH, WC));

// === ESPACE 3 (44,85 m²) ===
const esp3 = createFloor(0, -4, 8, 6, 0x4a90d9);
// Note: espace 3 est superposé visuellement - ajustons sa position
const esp3b = createFloor(8, 1, 5, 6, 0x4a90d9);
scene.add(esp3b);
scene.add(createLabel('🏢 ESPACE 3\n44,85 m²', 8, 1, 2.0, '#ffffff', '12px'));

// === TOILETTES FEMMES (6,40 m²) ===
const wcF = createFloor(8, -4, 3, 2.5, 0x9b59b6);
scene.add(wcF);
scene.add(createLabel('🚺 TOILETTES\nFEMMES 6,40 m²', 8, -4, 2.0, '#ffffff', '11px'));

// === TOILETTES HOMMES (6,28 m²) ===
const wcH = createFloor(8, -7.5, 3, 2.5, 0x9b59b6);
scene.add(wcH);
scene.add(createLabel('🚹 TOILETTES\nHOMMES 6,28 m²', 8, -7.5, 2.0, '#ffffff', '11px'));

// === BUREAU 1 / QHSE (23,42 m²) ===
const b1 = createFloor(-5, -7, 5, 4, 0x4a90d9);
scene.add(b1);
scene.add(createLabel('BUREAU 1\nQHSE - 23,42 m²', -5, -7, 2.0, '#ffffff', '12px'));
scene.add(createDesk(-5.5, -7.5, 0));
scene.add(createChair(-5.5, -6.9, Math.PI));
scene.add(createDesk(-4.5, -7.5, 0));
scene.add(createChair(-4.5, -6.9, Math.PI));

// === ACCUEIL / ASSISTANTE (27,85 m²) ===
const acc = createFloor(-5, -3.5, 5, 4, 0xf5a623);
scene.add(acc);
scene.add(createLabel('🏢 ACCUEIL\nASSISTANTE - 27,85 m²', -5, -3.5, 2.0, '#ffffff', '12px'));
scene.add(createDesk(-5, -3, 0, 0xa0522d));
scene.add(createChair(-5, -2.4, Math.PI));

// === SAS (6,28 m²) ===
const sas = createFloor(-5, -0.5, 3, 2, 0x6c757d);
scene.add(sas);
scene.add(createLabel('SAS\n6,28 m²', -5, -0.5, 1.5, '#ffffff', '11px'));

// === BUREAU 2 / AGENCE MARINE (25,76 m²) ===
const b2 = createFloor(-5, 3, 5, 4.5, 0x4a90d9);
scene.add(b2);
scene.add(createLabel('BUREAU 2\nAGENCE MARINE - 25,76 m²', -5, 3, 2.0, '#ffffff', '12px'));
scene.add(createDesk(-5.5, 2.5, 0));
scene.add(createChair(-5.5, 3.1, Math.PI));
scene.add(createDesk(-4.5, 2.5, 0));
scene.add(createChair(-4.5, 3.1, Math.PI));

// === BUREAU 3 / ACCONFE (33,14 m²) ===
const b3 = createFloor(-5, 7, 5, 5, 0x4a90d9);
scene.add(b3);
scene.add(createLabel('BUREAU 3\nACCONFE - 33,14 m²', -5, 7, 2.0, '#ffffff', '12px'));
scene.add(createDesk(-5.5, 6.5, 0));
scene.add(createChair(-5.5, 7.1, Math.PI));
scene.add(createDesk(-4.5, 6.5, 0));
scene.add(createChair(-4.5, 7.1, Math.PI));

// === BUREAU 4 / TRANSIT (37,84 m²) ===
const b4 = createFloor(3, 6, 6, 5, 0x4a90d9);
scene.add(b4);
scene.add(createLabel('BUREAU 4\nTRANSIT - 37,84 m²', 3, 6, 2.0, '#ffffff', '12px'));
scene.add(createDesk(2.5, 5.5, 0));
scene.add(createChair(2.5, 6.1, Math.PI));
scene.add(createDesk(3.5, 5.5, 0));
scene.add(createChair(3.5, 6.1, Math.PI));

// === SALLE DE RÉUNION COMMUNE (49,57 m²) ===
const reunion = createFloor(3, -1, 6, 5, 0x50c878);
scene.add(reunion);
scene.add(createLabel('SALLE DE RÉUNION\nCOMMUNE - 49,57 m²', 3, -1, 2.0, '#ffffff', '13px'));
// Table de réunion
const table = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.04, 1.5),
    new THREE.MeshStandardMaterial({ color: 0x5c3317, roughness: 0.4 })
);
table.position.set(3, 0.74, -1);
table.castShadow = true;
scene.add(table);
// Chaises autour
for (let i = -1; i <= 1; i+=0.5) {
    scene.add(createChair(3 + i, -1.8, Math.PI));
    scene.add(createChair(3 + i, -0.2, 0));
}

// === ARCHIVES (15,26 m²) ===
const arch2 = createFloor(3, 5, 4, 3, 0xd0021b);
scene.add(arch2);
scene.add(createLabel('📦 ARCHIVES\n15,26 m²', 3, 5, 2.0, '#ffffff', '12px'));

// === TOILETTES FEMMES (6,47 m²) - 2e bloc ===
const wcF2 = createFloor(8, -1, 3, 2.5, 0x9b59b6);
scene.add(wcF2);
scene.add(createLabel('🚺 WC FEMMES\n6,47 m²', 8, -1, 1.5, '#ffffff', '11px'));

// === RECEPTION ===
const reception = createFloor(-5, -7, 5, 4, 0xf5a623);
// déjà couvert par Bureau 1

// === LABELS SUPPLÉMENTAIRES ===
scene.add(createLabel('STATION TOTAL - 1er ÉTAGE (Bureaux)', 0, 10, 0.2, '#ff6b00', '18px'));
scene.add(createLabel('PROJET DE CONSTRUCTION D\'UNE ESSENCERIE (TotalEnergies)', 0, 9, 0.2, '#ffffff', '11px'));
scene.add(createLabel('MARS 2025 | G2BI | AMC Services', 0, 8, 0.2, '#aaaaaa', '10px'));

// === ANIMATION ===
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

console.log('✅ Station Total - 1er Étage chargé !');
</script>
</body>
</html>
